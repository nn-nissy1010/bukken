<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>画面一覧 — 居住者専用サイト 現状確認</title>
<style>
  :root{--navy:#1A365D;--border:#E2E8F0;--bg:#F8FAFC;--text:#2D3748;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Noto Sans JP","Hiragino Sans","Meiryo",sans-serif;color:var(--text);background:var(--bg);line-height:1.7;}
  header{background:var(--navy);color:#fff;padding:24px 32px;}
  header h1{margin:0 0 4px;font-size:20px;}
  header p{margin:0;opacity:.85;font-size:14px;}
  main{max-width:1400px;margin:0 auto;padding:24px 32px 64px;}
  section{margin-top:40px;}
  h2{font-size:18px;border-bottom:2px solid var(--navy);padding-bottom:8px;color:var(--navy);}
  h2 small{font-weight:400;color:#718096;font-size:13px;margin-left:8px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:16px;}
  .card{margin:0;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .card img{width:100%;height:200px;object-fit:cover;object-position:top;display:block;border-bottom:1px solid var(--border);background:#fff;transition:opacity .2s;}
  .card a:hover img{opacity:.85;}
  figcaption{padding:10px 14px;font-size:14px;font-weight:500;}
  .no{display:inline-block;min-width:22px;text-align:center;background:var(--navy);color:#fff;border-radius:4px;font-size:12px;padding:1px 5px;margin-right:6px;}
  .note{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-top:20px;font-size:13px;color:#4A5568;}
</style>
</head>
